name: Coverage

on:
  push:
    branches:
      - main

permissions:
  contents: write


jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y make gcc build-essential gcovr
      - name: Run coverage and capture percentage
        id: runcov
        run: |
          cd Lab1
          make coverage
          PCT=$(grep 'Lines executed' coverage_checksum.txt | head -1 | sed -E 's/.*:([0-9.]+)%.*$/\1/')
          echo "coverage=$PCT" >> $GITHUB_OUTPUT
      - name: Update README badge
        if: success()
        run: |
          cd Lab1
          PCT=$(grep 'Lines executed' coverage_checksum.txt | head -1 | sed -E 's/.*:([0-9.]+)%.*$/\1/')
          cd ../
          # Determine color based on percentage
          if (( $(echo "$PCT >= 80" | bc -l) )); then COLOR="brightgreen"; elif (( $(echo "$PCT >= 60" | bc -l) )); then COLOR="yellowgreen"; elif (( $(echo "$PCT >= 40" | bc -l) )); then COLOR="orange"; else COLOR="red"; fi
          sed -i "s|badge/coverage-[^-]*-[a-z]*|badge/coverage-${PCT}%25-${COLOR}|" README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update coverage badge to ${PCT}%" || true
          git push
