name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: sudo apt-get install -y make gcc gcov
      - name: Build
        run: |
          cd C/Checksum
          make all
      - name: Run unit tests
        run: |
          cd Lab1
          ./Lab1
